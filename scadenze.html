<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoKit Pro — Scadenze</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1a2e;
      --paper: #f7f4ef;
      --cream: #eee9e0;
      --accent: #c84b31;
      --accent2: #2d6a4f;
      --warn: #e9c46a;
      --muted: #8a8a9a;
      --border: #d8d2c8;
      --white: #ffffff;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--ink);
      color: var(--white);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }
    header .logo span { color: var(--accent); }
    header .trial-badge {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* AUTH OVERLAY */
    #auth-overlay {
      position: fixed; inset: 0;
      background: rgba(26,26,46,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .auth-box {
      background: var(--white);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .auth-box h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    .auth-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .auth-tab {
      flex: 1; padding: 8px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--ink);
      color: white;
      border-color: var(--ink);
    }

    /* FORM ELEMENTS */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
    .field input, .field select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: var(--paper);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--ink); }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }

    #auth-msg { font-size: 0.85rem; color: var(--accent); margin-top: 12px; text-align: center; min-height: 20px; }

    /* MAIN LAYOUT */
    main { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      margin-bottom: 4px;
    }
    .page-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    /* FORM CARD */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 28px;
      margin-bottom: 32px;
    }
    .card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

    .form-grid .field.full { grid-column: 1 / -1; }

    .btn-add {
      margin-top: 8px;
      padding: 10px 24px;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.8; }

    /* SCADENZE LIST */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .list-header h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
    }
    .count-badge {
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }

    .scadenza-item {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.2s;
    }
    .scadenza-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    .status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-ok { background: var(--accent2); }
    .status-warn { background: var(--warn); }
    .status-expired { background: var(--accent); }

    .scad-info { flex: 1; }
    .scad-info .titolo { font-weight: 600; font-size: 0.95rem; }
    .scad-info .email { font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; }

    .scad-data {
      text-align: right;
      flex-shrink: 0;
    }
    .scad-data .data { font-family: 'DM Mono', monospace; font-size: 0.9rem; font-weight: 600; }
    .scad-data .giorni { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .chip {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .chip-ok { background: #d8f3e8; color: var(--accent2); }
    .chip-warn { background: #fef5d7; color: #b08800; }
    .chip-expired { background: #fde8e4; color: var(--accent); }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .btn-delete:hover { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      background: var(--white);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    #form-msg { font-size: 0.85rem; color: var(--accent2); margin-top: 10px; min-height: 18px; }

    /* LOGOUT */
    .top-bar { display: flex; justify-content: flex-end; margin-bottom: 24px; }
    .btn-logout {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">Condo<span>Kit</span> Pro</div>
  <div class="trial-badge">PROVA GRATUITA 30gg</div>
</header>

<!-- AUTH OVERLAY -->
<div id="auth-overlay">
  <div class="auth-box">
    <h2>Accedi a CondoKit</h2>
    <p>Gestisci le scadenze del tuo condominio in automatico.</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setTab('login')">Accedi</button>
      <button class="auth-tab" onclick="setTab('register')">Registrati</button>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="admin@studio.it" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" onclick="handleAuth()">Continua</button>
    <div id="auth-msg"></div>
  </div>
</div>

<!-- MAIN APP -->
<main>
  <div class="top-bar">
    <button class="btn-logout" onclick="logout()">Esci</button>
  </div>

  <div class="page-title">Scadenzario</div>
  <div class="page-sub">Le email di avviso vengono inviate automaticamente ogni mattina.</div>

  <!-- FORM INSERIMENTO -->
  <div class="card">
    <h3>📋 Nuova scadenza</h3>
    <div class="form-grid">
      <div class="field">
        <label>Titolo</label>
        <input type="text" id="f-titolo" placeholder="Es. Assicurazione edificio" />
      </div>
      <div class="field">
        <label>Data scadenza</label>
        <input type="date" id="f-data" />
      </div>
      <div class="field">
        <label>Email destinatario</label>
        <input type="email" id="f-email" placeholder="fornitore@email.it" />
      </div>
      <div class="field">
        <label>Avvisa quanti giorni prima</label>
        <select id="f-giorni">
          <option value="7">7 giorni</option>
          <option value="15" selected>15 giorni</option>
          <option value="30">30 giorni</option>
          <option value="60">60 giorni</option>
        </select>
      </div>
    </div>
    <button class="btn-add" onclick="aggiungiScadenza()">+ Aggiungi scadenza</button>
    <div id="form-msg"></div>
  </div>

  <!-- LISTA SCADENZE -->
  <div class="list-header">
    <h3>Le tue scadenze</h3>
    <span class="count-badge" id="count-badge">0 voci</span>
  </div>
  <div id="lista-scadenze">
    <div class="empty-state">
      <div class="icon">📅</div>
      <p>Nessuna scadenza inserita.<br/>Aggiungine una qui sopra.</p>
    </div>
  </div>
</main>

<!-- SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ── CONFIGURA QUI ──────────────────────────────────────────────
  var SUPABASE_URL = 'https://vilngxqojqnzllgwvllo.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_mS30dM2t-nYw8435j_1tLQ_wZ1y3QOB';
  // ───────────────────────────────────────────────────────────────

  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var currentUser = null;
  var currentTab = 'login';

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.auth-tab').forEach(function(t, i) {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('auth-msg').textContent = '';
  }

  async function handleAuth() {
    var email = document.getElementById('auth-email').value.trim();
    var pass = document.getElementById('auth-password').value;
    var msg = document.getElementById('auth-msg');
    msg.textContent = 'Attendere...';
    msg.style.color = '#888';

    var result;
    if (currentTab === 'login') {
      result = await sb.auth.signInWithPassword({ email: email, password: pass });
    } else {
      result = await sb.auth.signUp({ email: email, password: pass });
    }

    if (result.error) {
      msg.style.color = 'var(--accent)';
      msg.textContent = result.error.message;
    } else {
      currentUser = result.data.user;
      document.getElementById('auth-overlay').style.display = 'none';
      caricaScadenze();
    }
  }

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }

  // ── SCADENZE ───────────────────────────────────────────────────

  async function aggiungiScadenza() {
    var titolo = document.getElementById('f-titolo').value.trim();
    var data = document.getElementById('f-data').value;
    var email = document.getElementById('f-email').value.trim();
    var giorni = parseInt(document.getElementById('f-giorni').value);
    var msg = document.getElementById('form-msg');

    if (!titolo || !data || !email) {
      msg.style.color = 'var(--accent)';
      msg.textContent = 'Compila tutti i campi.';
      return;
    }

    var { error } = await sb.from('scadenze').insert([{
      titolo: titolo,
      data_scadenza: data,
      email_destinatario: email,
      giorni_avviso: giorni,
      avviso_inviato: false,
      user_id: currentUser.id
    }]);

    if (error) {
      msg.style.color = 'var(--accent)';
      msg.textContent = 'Errore: ' + error.message;
    } else {
      msg.style.color = 'var(--accent2)';
      msg.textContent = '✓ Scadenza aggiunta con successo.';
      document.getElementById('f-titolo').value = '';
      document.getElementById('f-data').value = '';
      document.getElementById('f-email').value = '';
      caricaScadenze();
      setTimeout(function() { msg.textContent = ''; }, 3000);
    }
  }

  async function eliminaScadenza(id) {
    await sb.from('scadenze').delete().eq('id', id);
    caricaScadenze();
  }

  async function caricaScadenze() {
    var { data, error } = await sb.from('scadenze')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('data_scadenza', { ascending: true });

    if (error) return;
    renderLista(data || []);
  }

  function renderLista(lista) {
    var el = document.getElementById('lista-scadenze');
    var badge = document.getElementById('count-badge');
    badge.textContent = lista.length + (lista.length === 1 ? ' voce' : ' voci');

    if (lista.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📅</div><p>Nessuna scadenza inserita.<br/>Aggiungine una qui sopra.</p></div>';
      return;
    }

    var oggi = new Date();
    oggi.setHours(0,0,0,0);

    el.innerHTML = lista.map(function(s) {
      var dataScad = new Date(s.data_scadenza);
      var diffMs = dataScad - oggi;
      var diffGiorni = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      var dotClass, chipClass, chipLabel, giorniLabel;

      if (diffGiorni < 0) {
        dotClass = 'status-expired'; chipClass = 'chip-expired'; chipLabel = 'SCADUTA';
        giorniLabel = 'Scaduta ' + Math.abs(diffGiorni) + ' giorni fa';
      } else if (diffGiorni <= s.giorni_avviso) {
        dotClass = 'status-warn'; chipClass = 'chip-warn'; chipLabel = 'IN SCADENZA';
        giorniLabel = 'Mancano ' + diffGiorni + ' giorni';
      } else {
        dotClass = 'status-ok'; chipClass = 'chip-ok'; chipLabel = 'OK';
        giorniLabel = 'Mancano ' + diffGiorni + ' giorni';
      }

      var dataFmt = dataScad.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });

      return '<div class="scadenza-item">' +
        '<div class="status-dot ' + dotClass + '"></div>' +
        '<div class="scad-info">' +
          '<div class="titolo">' + s.titolo + '</div>' +
          '<div class="email">' + s.email_destinatario + '</div>' +
        '</div>' +
        '<div class="scad-data">' +
          '<div class="data">' + dataFmt + '</div>' +
          '<div class="giorni">' + giorniLabel + '</div>' +
        '</div>' +
        '<span class="chip ' + chipClass + '">' + chipLabel + '</span>' +
        '<button class="btn-delete" onclick="eliminaScadenza(\'' + s.id + '\')" title="Elimina">✕</button>' +
      '</div>';
    }).join('');
  }

  // Controlla sessione esistente
  sb.auth.getSession().then(function(res) {
    if (res.data.session) {
      currentUser = res.data.session.user;
      document.getElementById('auth-overlay').style.display = 'none';
      caricaScadenze();
    }
  });
</script>

</body>
</html>
